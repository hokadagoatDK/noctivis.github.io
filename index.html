<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrushFlow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Roboto', sans-serif;
    background-color: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    transition: background 0.5s ease;
  }
  h1 {
    font-size: 2em;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #8A2BE2, #C277FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .timer-container {
    position: relative;
    width: 250px;
    height: 250px;
  }
  .circle {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #8A2BE2, #C277FF);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
    color: #000;
    position: relative;
    overflow: hidden;
  }
  .progress-ring {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: conic-gradient(#C277FF 0deg, #8A2BE2 0deg);
    transition: background 0.3s linear;
  }
  .prompt {
    margin-top: 20px;
    font-size: 1.5em;
    text-align: center;
    color: #C277FF;
    transition: color 0.5s ease;
  }
  button {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 1em;
    color: #000;
    background: linear-gradient(135deg, #8A2BE2, #C277FF);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }
  button:hover { opacity: 0.85; }
</style>
</head>
<body>

<h1>BrushFlow</h1>
<div class="timer-container">
  <div class="circle" id="timer">2:00</div>
  <div class="progress-ring" id="progressRing"></div>
</div>
<div class="prompt" id="prompt">Press Start to begin</div>
<button id="startBtn">Start Brushing</button>

<script>
  const startBtn = document.getElementById('startBtn');
  const timerDisplay = document.getElementById('timer');
  const promptDisplay = document.getElementById('prompt');
  const progressRing = document.getElementById('progressRing');

  let totalTime = 120; // seconds
  let timeLeft = totalTime;
  let interval = null;
  let running = false;

  const prompts = [
    "Upper teeth",
    "Lower teeth",
    "Back teeth",
    "Gums & finishing touches"
  ];

  function updateTimerDisplay(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    timerDisplay.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
  }

  function updatePrompt(section) {
    if (section < prompts.length) {
      promptDisplay.textContent = prompts[section];
      const color = section % 2 === 0 ? '#C277FF' : '#8A2BE2';
      promptDisplay.style.color = color;
    }
  }

  function updateProgressRing() {
    const progress = ((totalTime - timeLeft) / totalTime) * 360;
    progressRing.style.background = `conic-gradient(#C277FF ${progress}deg, #8A2BE2 ${progress}deg 360deg)`;
  }

  function startStopTimer() {
    if (!running) {
      running = true;
      startBtn.textContent = "Stop Brushing";
      interval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay(timeLeft);
        updateProgressRing();
        const section = Math.floor((totalTime - timeLeft) / 30);
        if ((totalTime - timeLeft) % 30 === 0 && timeLeft !== totalTime) updatePrompt(section);
        if (timeLeft <= 0) {
          clearInterval(interval);
          promptDisplay.textContent = "Brushing complete";
          startBtn.textContent = "Start Brushing";
          running = false;
          timeLeft = totalTime;
          updateTimerDisplay(timeLeft);
          updateProgressRing();
        }
      }, 1000);
      updatePrompt(0);
    } else {
      running = false;
      clearInterval(interval);
      startBtn.textContent = "Start Brushing";
    }
  }

  startBtn.addEventListener('click', startStopTimer);
</script>

</body>
</html>
