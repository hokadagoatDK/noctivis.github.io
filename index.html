<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrushFlow</title>
<style>
  /* --- Reset & Body --- */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Roboto', sans-serif;
    background-color: #000;
    color: #8A2BE2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* --- Timer Circle --- */
  .timer-container {
    position: relative;
    width: 250px;
    height: 250px;
    margin: 20px;
  }

  .circle {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 4px solid #8A2BE2;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
    position: relative;
  }

  .progress-ring {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
    clip: rect(0px, 250px, 250px, 125px);
  }

  .progress-ring-fill {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 4px solid #8A2BE2;
    clip: rect(0px, 125px, 250px, 0px);
    transform: rotate(0deg);
    transform-origin: center;
    transition: transform 0.3s linear;
  }

  /* --- Text Prompt --- */
  .prompt {
    margin-top: 20px;
    font-size: 1.5em;
    text-align: center;
  }

  /* --- Buttons --- */
  button {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 1em;
    color: #000;
    background-color: #8A2BE2;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.8;
  }

</style>
</head>
<body>

<h1>BrushFlow</h1>

<div class="timer-container">
  <div class="circle" id="timer">2:00</div>
</div>

<div class="prompt" id="prompt">Press Start to begin</div>
<button id="startBtn">Start Brushing</button>

<script>
  const startBtn = document.getElementById('startBtn');
  const timerDisplay = document.getElementById('timer');
  const promptDisplay = document.getElementById('prompt');

  let totalTime = 120; // seconds
  let interval;

  const prompts = [
    "Upper teeth",
    "Lower teeth",
    "Back teeth",
    "Gums & finishing touches"
  ];

  function startTimer() {
    let timeLeft = totalTime;
    updatePrompt(0);
    startBtn.disabled = true;

    interval = setInterval(() => {
      timeLeft--;
      updateTimerDisplay(timeLeft);
      const section = Math.floor((totalTime - timeLeft) / 30);
      if ((totalTime - timeLeft) % 30 === 0 && timeLeft !== totalTime) {
        updatePrompt(section);
      }

      if (timeLeft <= 0) {
        clearInterval(interval);
        promptDisplay.textContent = "Brushing complete";
        startBtn.disabled = false;
      }
    }, 1000);
  }

  function updateTimerDisplay(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    timerDisplay.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
  }

  function updatePrompt(section) {
    if (section < prompts.length) {
      promptDisplay.textContent = prompts[section];
    }
  }

  startBtn.addEventListener('click', startTimer);
</script>

</body>
</html>
