<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrushFlow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Roboto', sans-serif;
    background-color: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  h1 {
    font-size: 2em;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #4B0082, #C277FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .timer-container {
    position: relative;
    width: 250px;
    height: 250px;
  }
  .circle {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: linear-gradient(90deg, #4B0082, #C277FF);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
    color: #000;
    position: relative;
    overflow: hidden;
  }
  .progress-ring {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: conic-gradient(#C277FF 0deg, #4B0082 0deg 360deg);
    transition: background 0.2s linear;
  }
  .prompt {
    margin-top: 20px;
    font-size: 1.5em;
    text-align: center;
    color: #C277FF;
    transition: color 0.5s ease;
  }
  button {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 1em;
    color: #000;
    background: linear-gradient(90deg, #4B0082, #C277FF);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }
  button:hover { opacity: 0.85; }
</style>
</head>
<body>

<h1>BrushFlow</h1>
<div class="timer-container">
  <div class="circle" id="timer">2:00</div>
  <div class="progress-ring" id="progressRing"></div>
</div>
<div class="prompt" id="prompt">Press Start to begin</div>
<button id="startBtn">Start Brushing</button>

<script>
  const startBtn = document.getElementById('startBtn');
  const timerDisplay = document.getElementById('timer');
  const promptDisplay = document.getElementById('prompt');
  const progressRing = document.getElementById('progressRing');

  const totalTime = 120; // seconds
  let startTime = null;
  let interval = null;
  let running = false;

  const prompts = [
    "Upper teeth",
    "Lower teeth",
    "Back teeth",
    "Gums & finishing touches"
  ];

  function updateTimerDisplay(secondsLeft) {
    const mins = Math.floor(secondsLeft / 60);
    const secs = secondsLeft % 60;
    timerDisplay.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
  }

  function updatePrompt(section) {
    if (section < prompts.length) {
      promptDisplay.textContent = prompts[section];
      promptDisplay.style.color = section % 2 === 0 ? '#C277FF' : '#4B0082';
    }
  }

  function updateProgressRing(secondsElapsed) {
    const progress = (secondsElapsed / totalTime) * 360;
    progressRing.style.background = `conic-gradient(#C277FF ${progress}deg, #4B0082 ${progress}deg 360deg)`;
  }

  function startStopTimer() {
    if (!running) {
      running = true;
      startBtn.textContent = "Stop Brushing";
      startTime = Date.now();
      interval = requestAnimationFrame(tick);
      updatePrompt(0);
    } else {
      // Reset timer when stopping
      running = false;
      cancelAnimationFrame(interval);
      timerDisplay.textContent = "2:00";
      progressRing.style.background = `conic-gradient(#C277FF 0deg, #4B0082 0deg 360deg)`;
      promptDisplay.textContent = "Press Start to begin";
      startBtn.textContent = "Start Brushing";
    }
  }

  function tick() {
    const now = Date.now();
    const elapsed = Math.floor((now - startTime) / 1000);
    const secondsLeft = totalTime - elapsed;

    if (secondsLeft <= 0) {
      timerDisplay.textContent = "0:00";
      updateProgressRing(totalTime);
      promptDisplay.textContent = "Brushing complete";
      startBtn.textContent = "Start Brushing";
      running = false;
      return;
    }

    updateTimerDisplay(secondsLeft);
    updateProgressRing(elapsed);
    const section = Math.floor(elapsed / 30);
    updatePrompt(section);

    interval = requestAnimationFrame(tick);
  }

  startBtn.addEventListener('click', startStopTimer);
</script>

</body>
</html>
